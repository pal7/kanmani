name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install all dependencies (including devDeps for tsc)
        working-directory: server
        run: npm install

      - name: Build TypeScript
        working-directory: server
        run: npm run build

      # Stage minimal deployment: dist/ + package.json + production node_modules.
      # No src/, no tsconfig, no devDependencies.
      - name: Stage and zip deployment artifacts
        run: |
          mkdir -p _deploy
          cp server/package.json _deploy/
          cp -r server/dist _deploy/
          cd _deploy && npm install --production --ignore-scripts && zip -r ../kanmani-api.zip .

      # Use Kudu's zipdeploy API directly — more reliable than webapps-deploy@v3
      # on VS subscriptions. SCM_DO_BUILD_DURING_DEPLOYMENT=false is set on the
      # App Service so Oryx does not re-run on the pre-built package.
      - name: Deploy to Azure App Service via Kudu zipdeploy
        run: |
          curl -f -s -X POST \
            "https://kanmani-api.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "${{ secrets.KUDU_USER }}:${{ secrets.KUDU_PASS }}" \
            -H "Content-Type: application/zip" \
            --data-binary @kanmani-api.zip \
            -w "\nHTTP %{http_code}\n"

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kanmani-api.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Deployment successful" || (echo "Health check failed" && exit 1)
