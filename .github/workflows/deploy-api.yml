name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install all dependencies (including devDeps for tsc)
        working-directory: server
        run: npm install

      - name: Build TypeScript
        working-directory: server
        run: npm run build

      # Stage a minimal deployment package — only compiled output and production
      # dependencies. Avoids deploying src/, tsconfig, devDependencies, etc.
      - name: Stage deployment artifacts
        run: |
          mkdir -p _deploy
          cp server/package.json _deploy/
          cp server/package-lock.json _deploy/
          cp -r server/dist _deploy/
          cd _deploy && npm install --production --ignore-scripts

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: kanmani-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./_deploy
